<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CAIKO TE AMO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(270deg, #ff4d6d, #ff8fa3, #ffc2d1);
    background-size: 600% 600%;
    animation: fondo 15s ease infinite;
    color:white;
    text-align:center;
}

@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    margin-top:30px;
    font-size:45px;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

button{
    background: white;
    color:#ff4d6d;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:20px;
    cursor:pointer;
    margin:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.corazon{
    position:absolute;
    color:white;
    font-size:25px;
    animation: flotar linear infinite;
}

@keyframes flotar{
    0%{transform: translateY(100vh); opacity:1;}
    100%{transform: translateY(-10vh); opacity:0;}
}

#carta{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#ff4d6d;
    padding:30px;
    border-radius:20px;
    width:80%;
    max-width:400px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    animation: aparecer 0.5s;
}

#minijuego{
    display:none;
    position:fixed;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    height:70vh;
    border:3px dashed white;
    border-radius:15px;
    overflow:hidden;
    background: rgba(255,255,255,0.1);
}

#canasta{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    user-select:none;
}

#puntaje{
    position:absolute;
    top:10px;
    right:20px;
    font-size:24px;
    color:white;
}

@keyframes explotar{
    0%{transform: scale(1);}
    50%{transform: scale(2);}
    100%{transform: scale(1);}
}
</style>
</head>

<body>

<h1>CAIKO TE AMO 💖</h1>

<button onclick="pregunta()">Apretame</button>
<button onclick="abrirCarta()">Leer carta</button>
<button onclick="iniciarJuego()">Jugamos?</button>

<div id="carta">
<p>
mi niña, gracias por tanto que me ayudaste en mi vida, estoy tan contento que estes conmigo...
</p>
<button onclick="cerrarCarta()">Cerrar</button>
</div>

<div id="minijuego">
    <div id="puntaje">Puntos: 0</div>
    <div id="canasta">🧺</div>
</div>

<audio autoplay loop>
    <source src="https://files.catbox.moe/8xq1u9.mp3" type="audio/mpeg">
</audio>

<script>
// BOTÓN “APRETAME” CON CRUZ
function pregunta(){
    let cuadro = document.createElement("div");
    cuadro.innerHTML = `
        <div style="position:relative;">
            <span onclick="cerrarPregunta()" 
                  style="
                  position:absolute;
                  top:-10px;
                  right:-10px;
                  background:#ff4d6d;
                  color:white;
                  border-radius:50%;
                  width:25px;
                  height:25px;
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  cursor:pointer;
                  font-weight:bold;
                  ">✖</span>

            <h2>¿Me amas? 💖</h2>
            <button onclick="respuesta()">Aceptar</button>
            <button onclick="respuesta()">Aceptar</button>
        </div>
    `;
    cuadro.id = "preguntaBox";
    cuadro.style.position = "fixed";
    cuadro.style.top = "50%";
    cuadro.style.left = "50%";
    cuadro.style.transform = "translate(-50%, -50%)";
    cuadro.style.background = "white";
    cuadro.style.color = "#ff4d6d";
    cuadro.style.padding = "25px";
    cuadro.style.borderRadius = "20px";
    cuadro.style.textAlign = "center";
    cuadro.style.boxShadow = "0 0 30px rgba(0,0,0,0.3)";
    document.body.appendChild(cuadro);
}

function cerrarPregunta(){
    let box = document.getElementById("preguntaBox");
    if(box) box.remove();
}

function respuesta(){
    alert("💖 SABÍA QUE IBAS A DECIR QUE SÍ 💖");
}

// CARTA
function abrirCarta(){ document.getElementById("carta").style.display="block"; }
function cerrarCarta(){ document.getElementById("carta").style.display="none"; }

// CORAZONES FLOTA
for(let i=0;i<40;i++){
    let corazon = document.createElement("div");
    corazon.innerHTML = "💖";
    corazon.className = "corazon";
    corazon.style.left = Math.random()*100 + "vw";
    corazon.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(corazon);
}

// --------------------
// MINI JUEGO CORAZÓN A LA CANASTA
// --------------------
let puntos = 0;
let juegoActivo = false;
let intervalCorazones;

function iniciarJuego(){
    puntos = 0;
    document.getElementById("puntaje").innerText = "Puntos: 0";
    document.getElementById("minijuego").style.display = "block";
    juegoActivo = true;
    crearCorazon();
    intervalCorazones = setInterval(crearCorazon, 1500);
    moverCanasta();
}

function crearCorazon(){
    if(!juegoActivo) return;
    let cor = document.createElement("div");
    cor.innerText = "💖";
    cor.style.position = "absolute";
    cor.style.left = Math.random()*80 + "%";
    cor.style.top = "-50px";
    cor.style.fontSize = "30px";
    cor.style.cursor = "pointer";
    document.getElementById("minijuego").appendChild(cor);

    let caida = setInterval(()=>{
        let top = parseInt(cor.style.top);
        if(top >= 60){
            cor.remove();
            clearInterval(caida);
        } else {
            cor.style.top = top + 5 + "px";
        }
    },50);

    cor.addEventListener("click", ()=>{
        cor.remove();
        clearInterval(caida);
        sumarPunto();
    });
}

function sumarPunto(){
    puntos++;
    document.getElementById("puntaje").innerText = "Puntos: " + puntos;
    if(puntos >= 3){
        terminarJuego();
    }
}

// CANASTA sigue el mouse
function moverCanasta(){
    let canasta = document.getElementById("canasta");
    document.getElementById("minijuego").addEventListener("mousemove",(e)=>{
        let rect = e.currentTarget.getBoundingClientRect();
        let x = e.clientX - rect.left;
        canasta.style.left = x + "px";
    });
}

function terminarJuego(){
    juegoActivo = false;
    clearInterval(intervalCorazones);
    // Explosión de corazones
    for(let i=0;i<50;i++){
        let cor = document.createElement("div");
        cor.innerText = "💥";
        cor.style.position = "absolute";
        cor.style.left = Math.random()*90 + "%";
        cor.style.top = Math.random()*60 + "%";
        cor.style.fontSize = "30px";
        cor.style.animation = "explotar 0.5s linear";
        document.getElementById("minijuego").appendChild(cor);
        setTimeout(()=>cor.remove(),1000);
    }
    // Terremoto
    let body = document.body;
    let t=0;
    let terremoto = setInterval(()=>{
        let x = Math.random()*10-5;
        let y = Math.random()*10-5;
        body.style.transform = `translate(${x}px,${y}px)`;
        t++;
        if(t>15){
            clearInterval(terremoto);
            body.style.transform = "translate(0,0)";
            alert("27 PUNTOS OBTENIDOS 💖🎉");
            document.getElementById("minijuego").style.display="none";
        }
    },50);
}
</script>

</body>
</html>
